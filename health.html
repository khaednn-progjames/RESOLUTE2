<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Health · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-secondary: rgba(255, 255, 255, 0.035);
  --bg-input: rgba(0, 0, 0, 0.28);
  --bg-input-focus: rgba(0, 0, 0, 0.36);
  --bg-dropdown: rgba(15, 15, 18, 0.96);

  --border: rgba(255, 255, 255, 0.06);
  --border-soft: rgba(255, 255, 255, 0.04);
  --border-strong: rgba(255, 255, 255, 0.12);

  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;

  --accent: #1D9E75;
  --accent-glow: rgba(29, 158, 117, 0.35);
  --warning: #FF8A4D;
  --warning-bg: rgba(163, 45, 45, 0.10);
  --tag-stack: #D8D6D0;
  --tag-stack-bg: rgba(255, 255, 255, 0.08);

  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(255, 255, 255, 0.32) 0%, transparent 65%),
    radial-gradient(50% 40% at 18% 90%, rgba(220, 220, 225, 0.20) 0%, transparent 65%),
    radial-gradient(55% 45% at 50% 55%, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
  filter: blur(85px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: 56px 20px 80px;
  padding-top: max(56px, env(safe-area-inset-top, 56px));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }

.sleep-open-btn {
  display: flex; align-items: center; gap: 14px;
  margin: 0 0 24px;
  padding: 16px 18px;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.06));
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 16px;
  text-decoration: none; color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, transform 0.10s;
}
.sleep-open-btn:hover {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.12));
}
.sleep-open-btn:active { transform: scale(0.985); }
.sleep-open-icon {
  font-size: 22px; line-height: 1;
  filter: grayscale(20%);
}
.sleep-open-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sleep-open-title {
  font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
}
.sleep-open-sub {
  font-size: 11px; font-weight: 500;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.sleep-open-chevron {
  font-size: 22px; line-height: 1;
  color: var(--text-tertiary);
  font-weight: 300;
}

.water-embed { margin-top: 56px; }
.water-iframe {
  display: block;
  width: 100%;
  height: 880px;
  border: 0;
  background: transparent;
  border-radius: 16px;
  overflow: hidden;
  color-scheme: dark;
}
@media (max-width: 480px) {
  .water-embed { margin-top: 40px; }
  .water-iframe { height: 780px; }
}

.stack-card {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 22px 22px 18px;
  backdrop-filter: blur(46px) saturate(2.2);
  -webkit-backdrop-filter: blur(46px) saturate(2.2);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.38), inset 0 0 60px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.55);
}

.stack-head { margin-bottom: 12px; }
.sf-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.sf-title {
  font-size: 24px; font-weight: 700;
  letter-spacing: -0.022em;
  color: var(--text-primary);
  line-height: 1.15; margin-bottom: 2px;
}
.stack-progress-text {
  font-family: var(--font-mono);
  font-size: 12px; color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  margin-top: 6px;
}
.stack-progress-track {
  height: 5px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 999px; overflow: hidden;
  margin: 14px 0 18px;
}
.stack-progress-fill {
  height: 100%; width: 0%;
  background: #FFFFFF; border-radius: 999px;
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
}

.stack-window { margin-bottom: 14px; }
.stack-window-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border-soft);
}
.stack-window-icon { font-size: 16px; }
.stack-window-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.stack-window-time { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }

.stack-item {
  display: grid;
  grid-template-columns: 32px 1fr auto auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--bg-secondary);
  margin-bottom: 6px;
  border: 1px solid transparent;
  transition: background 0.2s, border-color 0.2s;
}
.stack-item:hover { background: rgba(255,255,255,0.05); }
.stack-item.taken { background: rgba(29,158,117,0.08); }
.stack-item.taken .stack-item-name { text-decoration: line-through; color: var(--text-tertiary); }

@keyframes pulse-red {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
}
.stack-item.missed {
  border: 1px solid rgba(239, 68, 68, 0.45);
  animation: pulse-red 1.5s ease-in-out infinite;
}
.stack-item.missed .stack-check { border-color: rgba(239, 68, 68, 0.55); }
.stack-item.taken.missed { animation: none; border-color: transparent; }
.stack-item.taken.missed .stack-check { border-color: var(--accent); }

.stack-check {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  background: var(--bg-card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: transparent;
  transition: all 0.2s;
  flex-shrink: 0; font-family: inherit; padding: 0;
}
.stack-check:hover { border-color: var(--accent); }
.stack-check.checked {
  background: var(--accent); border-color: var(--accent);
  color: white;
  box-shadow: 0 0 12px var(--accent-glow);
}

.stack-item-body { min-width: 0; }
.stack-item-name {
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
  display: inline-flex; align-items: center;
  gap: 8px; flex-wrap: wrap;
  outline: none;
}
.stack-item-name[contenteditable="true"] {
  outline: 1px solid rgba(255,255,255,0.25);
  outline-offset: 4px; border-radius: 4px;
}
.stack-item-meta {
  font-size: 11px; color: var(--text-tertiary);
  margin-top: 2px; outline: none; cursor: text;
}
.stack-item-meta[contenteditable="true"] {
  outline: 1px solid rgba(255,255,255,0.2);
  outline-offset: 4px; border-radius: 4px;
  color: var(--text-secondary);
}
.stack-item-meta:empty::before {
  content: 'add notes…';
  color: var(--text-quaternary);
  font-style: italic;
}

.stack-item-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px; border-radius: 99px;
  font-weight: 600; letter-spacing: 0.04em;
  text-transform: lowercase;
}
.stack-item-tag.tag-stack { background: var(--tag-stack-bg); color: var(--tag-stack); }
.stack-item-tag.tag-not-ordered { background: var(--warning-bg); color: var(--text-tertiary); }

.stack-low-btn {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text-tertiary);
  font-size: 10px;
  padding: 5px 9px; border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-weight: 600; letter-spacing: 0.04em;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
  transition: all 0.15s;
}
.stack-low-btn:hover { border-color: rgba(163,45,45,0.4); color: var(--warning); }
.stack-low-btn.is-low {
  background: var(--warning-bg);
  border-color: rgba(163,45,45,0.4);
  color: var(--warning);
}

.stack-item-del {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 16px;
  padding: 4px 10px; border-radius: 6px;
  opacity: 0.7;
  transition: opacity 0.15s, color 0.15s, border-color 0.15s, background 0.15s;
  font-family: inherit;
  line-height: 1;
  min-width: 28px; min-height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
}
.stack-item:hover .stack-item-del { opacity: 1; }
.stack-item-del:hover, .stack-item-del:active {
  color: #FF6B6B;
  border-color: rgba(239, 68, 68, 0.45);
  background: rgba(239, 68, 68, 0.08);
  opacity: 1;
}

.stack-window-empty {
  font-size: 12px;
  color: var(--text-quaternary);
  font-style: italic;
  padding: 8px 12px;
}

/* ====== TICKER — cycles missed + running low every 5s ====== */
.stack-ticker {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  margin-bottom: 14px;
  background: rgba(0, 0, 0, 0.28);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 10px;
  font-size: 12px;
  min-height: 36px;
}
.stack-ticker-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #6BE3A4;
  flex-shrink: 0;
  transition: background 0.3s;
}
.stack-ticker.status-low .stack-ticker-dot { background: #FF8A4D; }
.stack-ticker.status-missed .stack-ticker-dot {
  background: #FF6B6B;
  animation: ticker-pulse 1.5s ease-in-out infinite;
}
@keyframes ticker-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
  50%      { box-shadow: 0 0 0 5px rgba(239, 68, 68, 0); }
}
.stack-ticker-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  flex-shrink: 0;
}
.stack-ticker-sep { color: var(--text-quaternary); flex-shrink: 0; }
.stack-ticker-msg {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: opacity 0.28s;
}
.stack-ticker-msg.is-fading { opacity: 0; }
.stack-ticker-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

.stack-add-wrap {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border-soft);
}
.stack-add-label { margin-bottom: 10px; }
.stack-add-row {
  display: grid;
  grid-template-columns: 1fr 1fr 110px 90px;
  gap: 6px;
  align-items: center;
}
.stack-input {
  font-size: 13px;
  padding: 9px 11px;
  border-radius: 10px;
  border: 1px solid var(--border-strong);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: inherit;
  transition: border-color 0.18s, background 0.18s;
}
.stack-input::placeholder { color: var(--text-tertiary); }
.stack-input:focus {
  outline: none;
  border-color: rgba(255, 255, 255, 0.40);
  background: var(--bg-input-focus);
}
.stack-select { cursor: pointer; }
.stack-add-btn {
  font-size: 13px;
  padding: 9px 11px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.85);
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B;
  font-weight: 700;
  letter-spacing: 0.005em;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.12s, box-shadow 0.18s, background 0.18s;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.55),
    0 4px 14px rgba(0, 0, 0, 0.30);
}
.stack-add-btn:hover {
  background: linear-gradient(180deg, #FFFFFF 0%, #F2F0EA 100%);
  transform: translateY(-1px);
}
.stack-add-btn:active { transform: translateY(0) scale(0.97); }

/* ====== SEARCH AUTOCOMPLETE — appears below the form when typing in Name ====== */
.stack-name-wrap { position: relative; }

.stack-search-results {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  width: max(100%, 320px);
  background: var(--bg-dropdown);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  max-height: 280px;
  overflow-y: auto;
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.65);
  z-index: 50;
  padding: 6px;
}
.stack-search-results[hidden] { display: none; }

.stack-result {
  display: flex;
  gap: 12px; align-items: center;
  width: 100%;
  padding: 9px 11px;
  background: transparent; border: none;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  color: var(--text-secondary);
  transition: background 0.12s;
}
.stack-result:hover, .stack-result.is-focused { background: rgba(255, 255, 255, 0.06); }

.stack-result-icon { font-size: 17px; flex-shrink: 0; width: 24px; text-align: center; }
.stack-result-body { min-width: 0; flex: 1; }
.stack-result-name {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary); line-height: 1.2;
}
.stack-result-meta {
  font-size: 11px; color: var(--text-tertiary);
  margin-top: 2px;
}

.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
  .stack-card { padding: 18px 16px 14px; }
  .stack-item { grid-template-columns: 28px 1fr auto; gap: 8px; }
  .stack-item .stack-low-btn { grid-column: 2 / 4; margin-top: 4px; justify-self: start; }
  .stack-add-row { grid-template-columns: 1fr 1fr; }
  .stack-add-row .stack-add-btn { grid-column: 1 / -1; }
  .stack-add-row .stack-select { grid-column: 1 / -1; }
  .stack-search-results { width: 100%; }
}

::selection { background: rgba(255, 255, 255, 0.25); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }

/* ===== Meals (photo → calories) ===== */
.meal-totals { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0 4px; }
.meal-total {
  flex: 1; min-width: 100px; padding: 12px 14px; border-radius: 12px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.18);
}
.meal-total .n { font-size: 22px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; letter-spacing: -0.03em; line-height: 1; }
.meal-total .l { font-size: 9.5px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-top: 5px; }
.meal-snap-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 18px; border-radius: 12px; border: 0; margin-top: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B;
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
}
.meal-snap-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
.meal-snap-btn:disabled { opacity: 0.55; cursor: wait; transform: none; }
.meal-status { font-size: 12px; color: var(--text-tertiary); margin-top: 10px; line-height: 1.5; }
.meal-status.err { color: #FF8A8A; }
.meal-list { list-style: none; margin: 14px 0 0; padding: 0; }
.meal-row {
  display: flex; align-items: center; gap: 12px; padding: 11px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.18); border-radius: 12px;
}
.meal-name { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
.meal-macros { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
.meal-del { border: 0; background: transparent; color: var(--text-tertiary); font-size: 17px; cursor: pointer; padding: 0 4px; opacity: 0.5; transition: opacity 0.2s, color 0.2s; }
.meal-row:hover .meal-del { opacity: 1; }
.meal-del:hover { color: #FF6B6B; }
</style>
</head>
<body>

<main>

  <div class="section-title">Meals</div>

  <div class="stack-card" id="mealsCard">
    <div class="stack-head">
      <div class="sf-eyebrow">Food log</div>
      <div class="sf-title">Snap a photo — Sirius counts the calories</div>
    </div>
    <div class="meal-totals">
      <div class="meal-total"><div class="n" id="mealCals">0</div><div class="l">Calories today</div></div>
      <div class="meal-total"><div class="n" id="mealProtein">0g</div><div class="l">Protein</div></div>
      <div class="meal-total"><div class="n" id="mealCarbs">0g</div><div class="l">Carbs</div></div>
      <div class="meal-total"><div class="n" id="mealFat">0g</div><div class="l">Fat</div></div>
    </div>
    <button class="meal-snap-btn" id="mealSnapBtn" type="button">📷 Snap a meal</button>
    <input type="file" id="mealFileInput" accept="image/*" capture="environment" style="display:none">
    <div class="meal-status" id="mealStatus"></div>
    <ul class="meal-list" id="mealList"></ul>
  </div>

  <section id="water" class="water-embed">
    <div class="section-title">Water Tracker</div>
    <iframe src="po-water.html" class="water-iframe" loading="lazy" title="Water Tracker"></iframe>
  </section>

  <div class="attribution">// editable template · all data stays in your browser</div>
</main>


<script>
// ===== Meals: photo → Sirius vision → calories/macros, logged per day =====
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const KEY_LS = 'nova_lite_api_key'; // shared BYOK Anthropic key

  function calKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function mealsKey() { return 'meals:' + calKey(); }
  function loadMeals() { try { return JSON.parse(localStorage.getItem(mealsKey())) || []; } catch (e) { return []; } }
  function saveMeals(arr) { try { localStorage.setItem(mealsKey(), JSON.stringify(arr)); } catch (e) {} }
  function apiKey() { try { return localStorage.getItem(KEY_LS) || ''; } catch (e) { return ''; } }

  function render() {
    const meals = loadMeals();
    let cal = 0, p = 0, c = 0, f = 0;
    meals.forEach((m) => { cal += m.cal || 0; p += m.protein || 0; c += m.carbs || 0; f += m.fat || 0; });
    $('mealCals').textContent = Math.round(cal);
    $('mealProtein').textContent = Math.round(p) + 'g';
    $('mealCarbs').textContent = Math.round(c) + 'g';
    $('mealFat').textContent = Math.round(f) + 'g';

    const list = $('mealList');
    list.innerHTML = '';
    meals.slice().reverse().forEach((m) => {
      const li = document.createElement('li');
      li.className = 'meal-row';
      const name = document.createElement('div');
      name.className = 'meal-name';
      name.textContent = m.name;
      const macros = document.createElement('div');
      macros.className = 'meal-macros';
      macros.textContent = Math.round(m.cal) + ' cal · ' + Math.round(m.protein) + 'p / ' + Math.round(m.carbs) + 'c / ' + Math.round(m.fat) + 'f';
      const del = document.createElement('button');
      del.className = 'meal-del';
      del.type = 'button';
      del.textContent = '×';
      del.addEventListener('click', () => { saveMeals(loadMeals().filter((x) => x.id !== m.id)); render(); });
      li.append(name, macros, del);
      list.appendChild(li);
    });
  }

  function status(msg, isErr) {
    const el = $('mealStatus');
    el.textContent = msg || '';
    el.classList.toggle('err', !!isErr);
  }

  async function analyzeMeal(mediaType, base64) {
    const system = "You are Sirius, a nutrition assistant. The user photographed a meal. " +
      "Identify what it is and estimate the full meal's nutrition — be realistic about portion size from the photo. " +
      "Respond in EXACTLY this format and nothing else:\n" +
      "NAME: <short name of the meal, e.g. \"Chicken burrito bowl\">\n" +
      "CALORIES: <number>\n" +
      "PROTEIN: <grams, number>\n" +
      "CARBS: <grams, number>\n" +
      "FAT: <grams, number>";
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': apiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 256,
        system: system,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: 'What is this meal and what are its estimated calories and macros?' }
          ]
        }],
      }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error.message || 'Something went wrong.');
    const reply = (json.content && json.content[0] && json.content[0].text) || '';
    const name = ((reply.match(/NAME:\s*(.+)/i) || [])[1] || 'Meal').trim();
    const num = (re) => parseFloat((reply.match(re) || [])[1]) || 0;
    const cal = num(/CALORIES:\s*([\d.]+)/i);
    if (!cal) throw new Error("Sirius couldn't read that photo as a meal — try another angle.");
    return { name, cal, protein: num(/PROTEIN:\s*([\d.]+)/i), carbs: num(/CARBS:\s*([\d.]+)/i), fat: num(/FAT:\s*([\d.]+)/i) };
  }

  $('mealSnapBtn').addEventListener('click', () => {
    if (!apiKey()) {
      status('No API key yet — open the Sirius tile from the home screen and paste your Anthropic key there first.', true);
      return;
    }
    $('mealFileInput').click();
  });
  $('mealFileInput').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const btn = $('mealSnapBtn');
    btn.disabled = true;
    status('Sirius is looking at your meal…');
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const match = /^data:([^;]+);base64,([\s\S]*)$/.exec(String(reader.result || ''));
        if (!match) throw new Error('Could not read that image — try a different file.');
        const meal = await analyzeMeal(match[1], match[2]);
        const arr = loadMeals();
        arr.push({ id: 'm' + Date.now().toString(36), ...meal, ts: Date.now() });
        saveMeals(arr);
        render();
        status('Logged: ' + meal.name + ' — ~' + Math.round(meal.cal) + ' cal ✓');
      } catch (err) {
        status(err.message || String(err), true);
      } finally {
        btn.disabled = false;
      }
    };
    reader.onerror = () => { status('Could not read that image — try a different file.', true); btn.disabled = false; };
    reader.readAsDataURL(file);
  });

  render();
  window.addEventListener('storage', render);
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['po_water_v1'],
    syncedPrefixes: ['meals:'],
    onApplied: function () {
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>

</body>
</html>
