<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Money Ideas · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
/* ===== Shared design tokens (same as the rest of the dashboard) ===== */
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --danger:  #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(255,255,255,0.10), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(200,200,200,0.06), transparent 50%);
  filter: blur(60px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 720px; margin: 0 auto; }
.dash-title {
  margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.mi-topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.key-btn {
  width: 40px; height: 40px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); cursor: pointer; font-size: 17px; opacity: 0.6; transition: opacity 0.15s, background 0.15s, color 0.15s;
}
.key-btn:hover { opacity: 1; background: rgba(255,255,255,0.08); color: var(--text-primary); }
.key-btn.has-key { opacity: 1; border-color: rgba(255,255,255,0.3); }

.gm-card {
  position: relative; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 18px;
  margin-bottom: 16px; backdrop-filter: blur(34px) saturate(1.7);
  -webkit-backdrop-filter: blur(34px) saturate(1.7); box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 16px 44px rgba(0,0,0,0.5);
}
.section-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 10px;
}

/* ---- key panel ---- */
.keypanel { display: none; }
.keypanel.open { display: block; }
.keybar { display: flex; gap: 8px; }
.keybar input {
  flex: 1; background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.10); color: var(--text-primary);
  border-radius: 11px; padding: 11px 13px; font-size: 13px; outline: none; font-family: inherit;
}
.keybar input:focus { border-color: rgba(255,255,255,0.28); }
.keybar button {
  border: 0; border-radius: 11px; padding: 0 18px; cursor: pointer; color: #0A0A0B;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); font-weight: 700; font-size: 13px; font-family: inherit;
}
.key-hint { font-size: 11.5px; color: var(--text-tertiary); line-height: 1.5; margin-top: 10px; }
.key-hint a { color: var(--text-secondary); }
.key-hint.saved { color: var(--text-primary); }

/* ---- context form ---- */
.mi-textarea {
  width: 100%; min-height: 90px; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none; resize: vertical;
  transition: border-color 0.2s, background 0.2s;
}
.mi-textarea::placeholder { color: var(--text-tertiary); }
.mi-textarea:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }
.chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin: 12px 0 14px; }
.chip {
  padding: 8px 13px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03); color: var(--text-tertiary); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.chip:hover { background: rgba(255,255,255,0.07); color: var(--text-secondary); }
.chip.on { background: rgba(255,255,255,0.14); color: var(--text-primary); border-color: rgba(255,255,255,0.28); }
.generate-btn {
  width: 100%; padding: 13px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B;
  font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 22px rgba(0,0,0,0.25);
  transition: filter 0.15s, transform 0.1s;
}
.generate-btn:hover { filter: brightness(1.06); }
.generate-btn:active { transform: translateY(1px); }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- results feed ---- */
.feed { display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 100%; }
.msg.user { align-self: flex-end; max-width: 90%; }
.bubble { border-radius: 14px; padding: 14px 16px; font-size: 14px; line-height: 1.6; }
.msg.user .bubble { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10); }
.msg.ai .bubble { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08); border-left: 2px solid rgba(255,255,255,0.4); }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 8px; }
.reply-list li { line-height: 1.5; }
.reply-list li b, .bubble b { color: var(--text-primary); }
.msg-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
.save-btn {
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em; padding: 7px 12px; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: var(--text-secondary);
  cursor: pointer; transition: background 0.15s, color 0.15s;
}
.save-btn:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }
.save-btn.done { color: var(--success); border-color: rgba(107,227,164,0.4); }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--text-primary); opacity: 0.4; animation: mi-d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){ animation-delay: 0.2s; } .dots i:nth-child(3){ animation-delay: 0.4s; }
@keyframes mi-d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

/* ---- follow-up composer ---- */
.composer { display: flex; gap: 8px; margin-top: 16px; }
.composer input {
  flex: 1; background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.08); color: var(--text-primary);
  border-radius: 12px; padding: 12px 15px; font-size: 14px; outline: none; font-family: inherit;
}
.composer input:focus { border-color: rgba(255,255,255,0.28); }
.composer button {
  width: 46px; border: 0; border-radius: 12px; cursor: pointer; color: #0A0A0B;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); font-size: 17px;
}
.composer button:active { transform: scale(0.95); }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 14px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="mi-topbar">
    <h1 class="dash-title" style="flex:1">Money Ideas</h1>
    <button class="key-btn" id="keyToggle" type="button" aria-label="API key settings">🔑</button>
  </div>

  <div class="gm-card keypanel" id="keypanel">
    <div class="section-title">Anthropic API Key</div>
    <div class="keybar">
      <input id="keyInput" type="password" placeholder="paste your Anthropic API key (sk-ant-…)" autocomplete="off">
      <button id="keySave" type="button">Save</button>
    </div>
    <div class="key-hint" id="keyHint">
      Stored only in this browser, sent straight to Anthropic. Shared with the Sirius mentor tile — paste it once.
      Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
    </div>
  </div>

  <div class="gm-card">
    <div class="section-title">Your Context</div>
    <textarea class="mi-textarea" id="contextInput" placeholder="Skills, resources, time available, existing income, constraints, risk tolerance… the more specific, the better the ideas."></textarea>

    <div class="section-title" style="margin-top:16px">Methods you're open to (optional)</div>
    <div class="chip-row" id="methodChips"></div>

    <button class="generate-btn" id="generateBtn" type="button">Generate Ideas</button>
  </div>

  <div class="gm-card" id="feedCard" style="display:none">
    <div class="section-title">Ideas</div>
    <div class="feed" id="feed"></div>
    <div class="composer">
      <input id="chatInput" placeholder="Ask a follow-up… “give me 3 more with low upfront cost”" autocomplete="off">
      <button id="sendBtn" type="button" aria-label="Send">→</button>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const KEY_LS = 'nova_lite_api_key'; // shared with the Sirius mentor tile
  const CONTEXT_LS = 'moneyideas:context';
  const METHODS_LS = 'moneyideas:methods';
  const IDEAS_LS = 'ideas:items';

  const METHODS = [
    'Freelance / gig work', 'Content / creator', 'E-commerce / reselling', 'Consulting',
    'Teaching / courses', 'Investing / trading', 'Local services', 'Rental / assets', 'Apps / SaaS / automation',
  ];

  function loadJSON(k, f) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? f : v; } catch (e) { return f; } }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  // ---------- API key ----------
  function savedKey() { try { return localStorage.getItem(KEY_LS) || ''; } catch (e) { return ''; } }
  function refreshKeyUI() {
    const has = !!savedKey();
    $('keyToggle').classList.toggle('has-key', has);
    if (has) {
      $('keyHint').classList.add('saved');
      $('keyHint').innerHTML = '✓ Key saved in this browser.';
      $('keyInput').placeholder = '•••• key saved ••••';
    }
  }
  $('keyToggle').addEventListener('click', () => $('keypanel').classList.toggle('open'));
  $('keySave').addEventListener('click', () => {
    const k = $('keyInput').value.trim();
    if (!k) return;
    try { localStorage.setItem(KEY_LS, k); } catch (e) {}
    $('keyInput').value = '';
    refreshKeyUI();
    $('keypanel').classList.remove('open');
  });
  refreshKeyUI();
  if (!savedKey()) $('keypanel').classList.add('open');

  // ---------- context + methods ----------
  let selectedMethods = loadJSON(METHODS_LS, []);
  $('contextInput').value = localStorage.getItem(CONTEXT_LS) || '';
  let ctxTimer = null;
  $('contextInput').addEventListener('input', function () {
    clearTimeout(ctxTimer);
    const val = this.value;
    ctxTimer = setTimeout(() => localStorage.setItem(CONTEXT_LS, val), 400);
  });

  function renderChips() {
    const row = $('methodChips');
    row.innerHTML = '';
    METHODS.forEach(m => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip' + (selectedMethods.includes(m) ? ' on' : '');
      chip.textContent = m;
      chip.addEventListener('click', () => {
        if (selectedMethods.includes(m)) selectedMethods = selectedMethods.filter(x => x !== m);
        else selectedMethods.push(m);
        saveJSON(METHODS_LS, selectedMethods);
        renderChips();
      });
      row.appendChild(chip);
    });
  }
  renderChips();

  // ---------- rendering ----------
  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
  function inlineMarks(s) { return esc(s).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>'); }
  function renderBody(text) {
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines) {
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }
  function scrollToEnd() { window.scrollTo(0, document.body.scrollHeight); }
  function addUser(t) {
    const e = document.createElement('div'); e.className = 'msg user';
    e.innerHTML = '<div class="bubble">' + esc(t) + '</div>';
    $('feed').appendChild(e); scrollToEnd();
  }
  function addAI(html) {
    const wrap = document.createElement('div'); wrap.className = 'msg ai';
    wrap.innerHTML = '<div class="bubble">' + html + '</div>' +
      '<div class="msg-actions"><button type="button" class="save-btn">+ Save ideas to backlog</button></div>';
    $('feed').appendChild(wrap);
    scrollToEnd();
    return wrap;
  }

  function saveIdeasFromText(rawText, btn) {
    const lines = String(rawText).split(/\r?\n/).map(l => l.trim())
      .filter(l => /^[-•*]\s+/.test(l))
      .map(l => l.replace(/^[-•*]\s+/, '').replace(/\*\*/g, '').trim())
      .filter(Boolean);
    if (lines.length === 0) return;
    const items = loadJSON(IDEAS_LS, []);
    lines.forEach(text => {
      items.unshift({ id: 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), text, done: false, addedAt: Date.now() });
    });
    saveJSON(IDEAS_LS, items);
    btn.textContent = '✓ Saved to Ideas'; btn.classList.add('done'); btn.disabled = true;
  }

  // ---------- conversation ----------
  let history = [];
  let busy = false;

  function systemPrompt() {
    const ctx = ($('contextInput').value || '').trim() || '(no context given yet — ask a clarifying question if needed)';
    const methods = selectedMethods.length ? selectedMethods.join(', ') : '(open to anything)';
    return "You are a practical, no-hype money-making idea generator embedded in the user's personal dashboard. " +
      "Suggest concrete, realistic ways they could make more money, tailored specifically to their context and preferred methods below. " +
      "Prefer ideas achievable with what they already have — skip generic get-rich-quick advice, MLMs, and anything requiring large upfront capital unless they mention having capital. " +
      "Format every idea as a '- ' bullet point. Bold the idea name with **double asterisks**, then a short reason it fits them, then a concrete first step, all in one bullet. " +
      "Give 4-6 ideas unless asked for more or fewer. Keep each bullet to 1-2 sentences.\n\n" +
      "User's context: " + ctx + "\n" +
      "Preferred methods: " + methods;
  }

  async function send(userText) {
    userText = (userText || '').trim();
    if (busy) return;
    const key = savedKey();
    if (!key) {
      $('keypanel').classList.add('open');
      $('feedCard').style.display = '';
      addAI(renderBody('- Paste your **Anthropic API key** above first, then try again.'));
      return;
    }
    busy = true;
    $('generateBtn').disabled = true;
    $('feedCard').style.display = '';
    if (userText) { addUser(userText); history.push({ role: 'user', content: userText }); }
    else { history.push({ role: 'user', content: 'Give me money-making ideas based on my context and methods.' }); }
    const loading = addAI('<span class="dots"><i></i><i></i><i></i></span>');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-8',
          max_tokens: 1024,
          system: systemPrompt(),
          messages: history,
        }),
      });
      const json = await res.json();
      if (json.error) {
        loading.querySelector('.bubble').innerHTML = renderBody('- ' + (json.error.message || 'Something went wrong — check your API key.'));
        loading.querySelector('.msg-actions').remove();
      } else {
        const reply = (json.content && json.content[0] && json.content[0].text) || 'Hmm, no reply.';
        history.push({ role: 'assistant', content: reply });
        loading.querySelector('.bubble').innerHTML = renderBody(reply);
        const saveBtn = loading.querySelector('.save-btn');
        saveBtn.addEventListener('click', () => saveIdeasFromText(reply, saveBtn));
      }
    } catch (e) {
      loading.querySelector('.bubble').innerHTML = renderBody('- Could not reach Anthropic — check your connection and key.');
      loading.querySelector('.msg-actions').remove();
    }
    busy = false;
    $('generateBtn').disabled = false;
  }

  $('generateBtn').addEventListener('click', () => send(''));
  $('sendBtn').addEventListener('click', () => { const v = $('chatInput').value; $('chatInput').value = ''; send(v); });
  $('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') { const v = $('chatInput').value; $('chatInput').value = ''; send(v); } });

  document.addEventListener('DOMContentLoaded', function () {
    if (typeof initCloudSync !== 'function') return;
    initCloudSync({
      appKey: 'moneyideas',
      syncedKeys: [CONTEXT_LS, METHODS_LS],
      onApplied: function () {
        $('contextInput').value = localStorage.getItem(CONTEXT_LS) || '';
        selectedMethods = loadJSON(METHODS_LS, []);
        renderChips();
      },
    });
  });
})();
</script>
</body>
</html>
