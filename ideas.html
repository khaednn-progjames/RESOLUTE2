<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Ideas · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
/* ===== Shared design tokens (same as the rest of the dashboard) ===== */
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --danger:  #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(255,255,255,0.30), transparent 55%),
    radial-gradient(circle at 18% 90%, rgba(220,220,225,0.20), transparent 60%),
    radial-gradient(circle at 50% 55%, rgba(255,255,255,0.08), transparent 65%);
  filter: blur(85px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 760px; margin: 0 auto; }
.dash-title {
  margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.ideas-topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }

.gm-card {
  position: relative; background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 16px; padding: 20px;
  margin-bottom: 16px; backdrop-filter: blur(46px) saturate(2.2);
  -webkit-backdrop-filter: blur(46px) saturate(2.2); box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.38), inset 0 0 60px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.55);
}

/* ===== Header: progress + copy button ===== */
.gm-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.gm-eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
.gm-progress-row { display: flex; align-items: baseline; gap: 6px; }
.gm-progress-num { font-size: 38px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.04em; color: var(--text-primary); line-height: 1; }
.gm-progress-total { font-family: var(--font-mono); font-size: 17px; color: var(--text-tertiary); }
.gm-progress-label { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-left: 4px; }
.copy-btn {
  display: inline-flex; align-items: center; gap: 7px; padding: 10px 16px; border-radius: 11px;
  border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05); color: var(--text-primary);
  font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer;
  transition: background 0.15s, transform 0.1s; white-space: nowrap;
}
.copy-btn:hover { background: rgba(255,255,255,0.10); }
.copy-btn:active { transform: translateY(1px); }
.copy-btn.copied { background: rgba(107,227,164,0.14); border-color: rgba(107,227,164,0.4); color: #FFFFFF; }
.gm-bar { display: flex; gap: 4px; height: 6px; margin-bottom: 4px; }
.gm-bar:empty { display: none; }
.gm-bar-seg { flex: 1; background: rgba(255,255,255,0.06); border-radius: 3px; transition: background 0.3s; }
.gm-bar-seg-done { background: #FFFFFF; }

/* ===== List ===== */
.idea-list { list-style: none; margin: 16px 0 0; padding: 0; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 18px 0; }
.idea-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.18); border-radius: 12px;
  transition: background 0.2s, opacity 0.3s;
}
.idea-row:hover { background: rgba(255,255,255,0.06); }
.idea-row.is-done { opacity: 0.45; }
.idea-row.is-done .idea-text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.4); }
.idea-check {
  appearance: none; -webkit-appearance: none; width: 22px; height: 22px; flex-shrink: 0; margin: 0;
  border: 1.5px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); border-radius: 7px;
  position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.idea-check:checked { background: #FFFFFF; border-color: #FFFFFF; box-shadow: 0 0 12px rgba(255,255,255,0.30); }
.idea-check:checked::after {
  content: ''; position: absolute; left: 6px; top: 2px; width: 6px; height: 11px;
  border: solid #0A0A0B; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg);
}
.idea-text { flex: 1; font-size: 14px; color: var(--text-primary); outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
.idea-text[contenteditable="true"] { outline: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); }
.idea-time { font-size: 10.5px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; }
.idea-del { border: 0; background: transparent; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 0 4px; opacity: 0.5; transition: opacity 0.2s, color 0.2s; }
.idea-row:hover .idea-del { opacity: 1; }
.idea-del:hover { color: var(--danger); }

/* ===== Add row ===== */
.gm-input-wrap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
.gm-input {
  flex: 1; min-width: 0; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
  background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }
.gm-add {
  padding: 11px 20px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 22px rgba(0,0,0,0.25); transition: transform 0.1s, filter 0.15s;
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:active { transform: translateY(0); }

.hint { font-size: 11.5px; color: var(--text-tertiary); line-height: 1.5; margin: 4px 2px 0; }

/* ===== Sirius (AI mentor) integration ===== */
.sirius-btn {
  display: inline-flex; align-items: center; gap: 7px; padding: 10px 14px; border-radius: 11px;
  border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05); color: var(--text-primary);
  font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer;
  transition: background 0.15s; white-space: nowrap;
}
.sirius-btn:hover { background: rgba(255,255,255,0.10); }
.idea-expand {
  border: 0; background: transparent; color: var(--text-tertiary); font-size: 14px; cursor: pointer;
  padding: 0 4px; opacity: 0.5; transition: opacity 0.2s, color 0.2s; flex-shrink: 0;
}
.idea-row:hover .idea-expand { opacity: 1; }
.idea-expand:hover { color: var(--text-primary); }
.idea-expand:disabled { opacity: 0.3; cursor: wait; }

.sirius-modal-bg {
  position: fixed; inset: 0; z-index: 220; display: none;
  align-items: center; justify-content: center; padding: 20px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.sirius-modal-bg.show { display: flex; }
.sirius-modal {
  width: 100%; max-width: 480px; max-height: 82vh; overflow-y: auto;
  background: #0e0e10; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 22px; box-shadow: 0 24px 70px rgba(0,0,0,0.6);
}
.sirius-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.sirius-modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.sirius-modal-close { border: 0; background: transparent; color: var(--text-tertiary); font-size: 24px; line-height: 1; cursor: pointer; padding: 0 4px; }
.sirius-modal-close:hover { color: var(--text-primary); }

.sirius-key-form { display: flex; flex-direction: column; gap: 10px; }
.sirius-key-row { display: flex; gap: 8px; }
.sirius-key-row input {
  flex: 1; min-width: 0; padding: 11px 13px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.3); color: var(--text-primary); font-family: inherit; font-size: 13px; outline: none;
}
.sirius-key-row button {
  border: 0; border-radius: 11px; padding: 0 16px; cursor: pointer; color: #0A0A0B;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); font-weight: 700; font-size: 13px; font-family: inherit;
}
.sirius-key-hint { font-size: 11.5px; color: var(--text-tertiary); line-height: 1.5; }
.sirius-key-hint a { color: var(--text-secondary); }

.sirius-loading { display: flex; align-items: center; gap: 8px; color: var(--text-tertiary); font-size: 13px; padding: 8px 0; }
.sirius-dots { display: inline-flex; gap: 5px; }
.sirius-dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--text-primary); opacity: 0.4; animation: sirius-d 1.2s ease-in-out infinite; }
.sirius-dots i:nth-child(2) { animation-delay: 0.2s; } .sirius-dots i:nth-child(3) { animation-delay: 0.4s; }
@keyframes sirius-d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.sirius-idea-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 13px;
  margin-bottom: 6px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 11px;
}
.sirius-idea-text { font-size: 13.5px; color: var(--text-primary); line-height: 1.4; }
.sirius-idea-add {
  flex-shrink: 0; font-size: 11px; font-weight: 700; padding: 7px 11px; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: var(--text-secondary);
  cursor: pointer; transition: background 0.15s, color 0.15s;
}
.sirius-idea-add:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }
.sirius-idea-add.done { color: var(--success); border-color: rgba(107,227,164,0.4); }
.sirius-err { color: var(--danger); font-size: 12.5px; line-height: 1.5; }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
  .gm-progress-num { font-size: 32px; }
  .idea-time { display: none; }
}
</style>
</head>
<body>
<div class="page">

  <div class="ideas-topbar">
    <h1 class="dash-title" style="flex:1">Ideas</h1>
  </div>

  <div class="gm-card">
    <div class="gm-header">
      <div>
        <div class="gm-eyebrow">Dashboard Backlog</div>
        <div class="gm-progress-row">
          <span class="gm-progress-num" id="doneNum">0</span>
          <span class="gm-progress-total" id="totalNum">/ 0</span>
          <span class="gm-progress-label">built</span>
        </div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="sirius-btn" id="siriusBrainstormBtn" type="button">🧠 Brainstorm</button>
        <button class="copy-btn" id="copyBtn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="copyBtnText">Copy for Claude</span>
        </button>
      </div>
    </div>
    <div class="gm-bar" id="gmBar"></div>

    <ul class="idea-list" id="ideaList"></ul>
    <div id="emptyState" class="empty-state">No ideas yet — jot one below.</div>

    <div class="gm-input-wrap">
      <input id="ideaInput" class="gm-input" type="text" placeholder="A feature idea for the dashboard…" autocomplete="off">
      <button type="button" id="ideaAddBtn" class="gm-add">+ Add</button>
    </div>
    <div class="hint">Check an idea off once it's built. Hover an idea for a "✨" button to have Sirius flesh it out. "Copy for Claude" puts the whole list on your clipboard — paste it into a Claude Code chat to have it built.</div>
  </div>

</div>

<!-- ===== Sirius modal (shared by "Brainstorm" and per-idea "Expand") ===== -->
<div class="sirius-modal-bg" id="siriusModalBg">
  <div class="sirius-modal" role="dialog" aria-label="Sirius">
    <div class="sirius-modal-head">
      <span class="sirius-modal-title" id="siriusModalTitle">Sirius</span>
      <button class="sirius-modal-close" id="siriusModalClose" type="button" aria-label="Close">×</button>
    </div>
    <div id="siriusModalBody"></div>
  </div>
</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const STORE_KEY = 'ideas:items';

  function loadJSON(k, f) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? f : v; } catch (e) { return f; } }
  function save(items) { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }
  function load() { return loadJSON(STORE_KEY, []); }
  function newId() { return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function relTime(ts) {
    if (!ts) return '';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    if (s < 604800) return Math.floor(s / 86400) + 'd ago';
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function renderBar(items) {
    const bar = $('gmBar');
    bar.innerHTML = '';
    items.forEach(it => {
      const seg = document.createElement('div');
      seg.className = 'gm-bar-seg' + (it.done ? ' gm-bar-seg-done' : '');
      bar.appendChild(seg);
    });
  }

  function render() {
    const items = load();
    const done = items.filter(i => i.done).length;
    $('doneNum').textContent = done;
    $('totalNum').textContent = '/ ' + items.length;
    renderBar(items);

    const list = $('ideaList');
    list.innerHTML = '';
    $('emptyState').style.display = items.length ? 'none' : '';

    items.slice().sort((a, b) => (a.done === b.done) ? (b.addedAt || 0) - (a.addedAt || 0) : (a.done ? 1 : -1))
      .forEach(it => {
        const li = document.createElement('li');
        li.className = 'idea-row' + (it.done ? ' is-done' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'idea-check';
        cb.checked = !!it.done;
        cb.addEventListener('change', () => {
          const all = load();
          const entry = all.find(x => x.id === it.id);
          if (entry) { entry.done = cb.checked; save(all); render(); }
        });

        const txt = document.createElement('div');
        txt.className = 'idea-text';
        txt.textContent = it.text;
        txt.contentEditable = 'true';
        txt.addEventListener('blur', () => {
          const all = load();
          const entry = all.find(x => x.id === it.id);
          if (entry) { entry.text = txt.textContent.trim(); save(all); }
        });
        txt.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); txt.blur(); } });

        const time = document.createElement('span');
        time.className = 'idea-time';
        time.textContent = relTime(it.addedAt);

        const expand = document.createElement('button');
        expand.type = 'button';
        expand.className = 'idea-expand';
        expand.title = 'Flesh this out with Sirius';
        expand.textContent = '✨';
        expand.addEventListener('click', () => runSiriusExpand(it.id, expand));

        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'idea-del';
        del.textContent = '×';
        del.addEventListener('click', () => {
          save(load().filter(x => x.id !== it.id));
          render();
        });

        li.append(cb, txt, time, expand, del);
        list.appendChild(li);
      });
  }

  function addIdea() {
    const text = $('ideaInput').value.trim();
    if (!text) return;
    const items = load();
    items.unshift({ id: newId(), text, done: false, addedAt: Date.now() });
    save(items);
    $('ideaInput').value = '';
    render();
  }

  function copyForClaude() {
    const items = load().slice().sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
    let md = '## Dashboard ideas\n\n';
    if (items.length === 0) md += '_(no ideas yet)_\n';
    items.forEach(it => { md += '- [' + (it.done ? 'x' : ' ') + '] ' + it.text + '\n'; });
    const btn = $('copyBtn'), label = $('copyBtnText');
    const done = () => {
      btn.classList.add('copied'); label.textContent = 'Copied ✓';
      setTimeout(() => { btn.classList.remove('copied'); label.textContent = 'Copy for Claude'; }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(md).then(done).catch(() => fallbackCopy(md, done));
    } else {
      fallbackCopy(md, done);
    }
  }
  function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
  }

  $('ideaAddBtn').addEventListener('click', addIdea);
  $('ideaInput').addEventListener('keydown', e => { if (e.key === 'Enter') addIdea(); });
  $('copyBtn').addEventListener('click', copyForClaude);

  // ---------- Sirius (AI mentor): brainstorm + expand ----------
  const SIRIUS_KEY_LS = 'nova_lite_api_key'; // shared with the Sirius mentor tile
  function siriusKey() { try { return localStorage.getItem(SIRIUS_KEY_LS) || ''; } catch (e) { return ''; } }
  function siriusEsc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

  function openSiriusModal(title) {
    $('siriusModalTitle').textContent = title;
    $('siriusModalBg').classList.add('show');
  }
  function closeSiriusModal() { $('siriusModalBg').classList.remove('show'); }
  $('siriusModalClose').addEventListener('click', closeSiriusModal);
  $('siriusModalBg').addEventListener('click', (e) => { if (e.target === $('siriusModalBg')) closeSiriusModal(); });

  function renderKeyForm(onSaved) {
    $('siriusModalBody').innerHTML =
      '<div class="sirius-key-form">' +
      '<div class="sirius-key-row"><input id="siriusKeyInput" type="password" placeholder="paste your Anthropic API key (sk-ant-…)" autocomplete="off">' +
      '<button id="siriusKeySave" type="button">Save</button></div>' +
      '<div class="sirius-key-hint">Stored only in this browser, sent straight to Anthropic. Shared with the Sirius mentor tile — paste it once. ' +
      'Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.</div>' +
      '</div>';
    $('siriusKeySave').addEventListener('click', () => {
      const k = $('siriusKeyInput').value.trim();
      if (!k) return;
      try { localStorage.setItem(SIRIUS_KEY_LS, k); } catch (e) {}
      onSaved();
    });
  }

  function renderSiriusLoading() {
    $('siriusModalBody').innerHTML = '<div class="sirius-loading"><span class="sirius-dots"><i></i><i></i><i></i></span> Sirius is thinking…</div>';
  }
  function renderSiriusError(msg) {
    $('siriusModalBody').innerHTML = '<div class="sirius-err">' + siriusEsc(msg) + '</div>';
  }

  async function callSirius(systemPrompt, userText) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': siriusKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 1024,
        system: systemPrompt,
        messages: [{ role: 'user', content: userText }],
      }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error.message || 'Something went wrong.');
    return (json.content && json.content[0] && json.content[0].text) || '';
  }

  function bulletLines(text) {
    return String(text).split(/\r?\n/).map(l => l.trim())
      .filter(l => /^[-•*]\s+/.test(l))
      .map(l => l.replace(/^[-•*]\s+/, '').replace(/\*\*/g, '').trim())
      .filter(Boolean);
  }

  // ---- Brainstorm new dashboard ideas ----
  function runSiriusBrainstorm() {
    openSiriusModal('🧠 Brainstorm new ideas');
    if (!siriusKey()) { renderKeyForm(runSiriusBrainstorm); return; }
    renderSiriusLoading();

    const existing = load().map(i => i.text).slice(0, 40);
    const system = "You are Sirius, embedded in the user's personal life-tracking dashboard as a feature-idea brainstorm partner. " +
      "The dashboard already has tiles for: Main (daily goals + a 1-year life goal), Water, Finance, Notes, Links, Sirius mentor chat, and this Ideas backlog, " +
      "plus a Miscellaneous section with Money Ideas, Bank Accounts, USPS Tracking, and an Iron Condor options trading bot. " +
      "Suggest fresh, concrete NEW feature ideas for this dashboard that aren't already covered. Avoid repeating anything close to the existing backlog items listed below. " +
      "Format every suggestion as a '- ' bullet point, one short sentence each, no preamble. Give 6-8 suggestions.\n\n" +
      "Existing backlog: " + (existing.length ? existing.join(', ') : '(empty)');

    callSirius(system, 'Give me new dashboard feature ideas.').then(reply => {
      const suggestions = bulletLines(reply);
      if (suggestions.length === 0) { renderSiriusError('Sirius didn\'t return any ideas — try again.'); return; }
      $('siriusModalBody').innerHTML = suggestions.map((s, i) =>
        '<div class="sirius-idea-row"><div class="sirius-idea-text">' + siriusEsc(s) + '</div>' +
        '<button class="sirius-idea-add" data-i="' + i + '" type="button">+ Add</button></div>'
      ).join('');
      $('siriusModalBody').querySelectorAll('.sirius-idea-add').forEach(btn => {
        btn.addEventListener('click', () => {
          const text = suggestions[parseInt(btn.dataset.i, 10)];
          const items = load();
          items.unshift({ id: newId(), text, done: false, addedAt: Date.now() });
          save(items);
          render();
          btn.textContent = '✓ Added'; btn.classList.add('done'); btn.disabled = true;
        });
      });
    }).catch(e => renderSiriusError(e.message || String(e)));
  }
  $('siriusBrainstormBtn').addEventListener('click', runSiriusBrainstorm);

  // ---- Expand a single idea into a fuller spec ----
  function runSiriusExpand(id, btnEl) {
    const items = load();
    const entry = items.find(x => x.id === id);
    if (!entry) return;
    if (!siriusKey()) { openSiriusModal('✨ Expand idea'); renderKeyForm(() => runSiriusExpand(id, btnEl)); return; }

    btnEl.disabled = true;
    const original = btnEl.textContent;
    btnEl.textContent = '…';

    const system = "You are Sirius, embedded in the user's personal dashboard, helping flesh out a one-line feature idea before it's handed to a coding assistant to build. " +
      "Expand the idea into 2-3 concise sentences: what it does, why it's useful, and a rough approach for how it could work. " +
      "No preamble, no bullet points, no markdown — just the expanded description as plain text, written to directly replace the original one-liner.";

    callSirius(system, 'Idea to expand: ' + entry.text).then(reply => {
      const all = load();
      const e2 = all.find(x => x.id === id);
      if (e2) { e2.text = reply.trim(); save(all); render(); }
    }).catch(() => {
      btnEl.disabled = false;
      btnEl.textContent = original;
    });
  }

  render();

  document.addEventListener('DOMContentLoaded', function () {
    if (typeof initCloudSync !== 'function') return;
    initCloudSync({
      appKey: 'ideas',
      syncedKeys: [STORE_KEY],
      onApplied: render,
    });
  });
})();
</script>
</body>
</html>
