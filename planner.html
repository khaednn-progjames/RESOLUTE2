<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Planner · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<link rel="stylesheet" href="design-system.css">
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

.gm-card {
  position: relative; background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 16px; padding: 20px;
  margin-bottom: 14px; backdrop-filter: blur(46px) saturate(2.2);
  -webkit-backdrop-filter: blur(46px) saturate(2.2);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.38), inset 0 0 60px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.55);
  overflow: hidden;
}

/* Month navigator */
.month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.month-nav-btn {
  width: 32px; height: 32px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
  border-radius: 9px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.05);
  color: var(--text-secondary); font-size: 17px; cursor: pointer; transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.month-nav-btn:hover { background: rgba(255,255,255,0.10); color: var(--text-primary); }
.month-nav-label { flex: 1; font-size: 19px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; text-align: center; }
.month-today-btn {
  padding: 7px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.09);
  color: var(--text-primary); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
  transition: background 0.15s;
}
.month-today-btn:hover { background: rgba(255,255,255,0.07); }

.gm-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
.gm-header-left { display: flex; flex-direction: column; }
.gm-eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
.gm-progress-row { display: flex; align-items: baseline; gap: 6px; }
.gm-progress-num { font-size: 42px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.045em; color: var(--text-primary); line-height: 1; }
.gm-progress-total { font-family: var(--font-mono); font-size: 18px; color: var(--text-tertiary); }
.gm-progress-label { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-left: 4px; }

.gm-streak {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 999px;
  background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.18);
  color: var(--text-tertiary); font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase;
}

.gm-bar { display: flex; gap: 4px; height: 6px; margin-bottom: 16px; }
.gm-bar:empty { display: none; }
.gm-bar-seg { flex: 1; background: rgba(255,255,255,0.06); border-radius: 3px; transition: background 0.3s, box-shadow 0.3s; }
.gm-bar-seg-done { background: var(--success); box-shadow: 0 0 6px rgba(107,227,164,0.40); }

.goal-list { list-style: none; margin: 0; padding: 0; }
.empty-state { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 14px 0; }
.gm-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.18); border-radius: 12px;
  transition: background 0.2s, opacity 0.3s;
}
.gm-row:hover { background: rgba(255,255,255,0.06); }
.gm-row.gm-row-done { opacity: 0.45; background: rgba(107,227,164,0.04); }
.gm-row.gm-row-done .gm-text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.4); }
.gm-check {
  appearance: none; -webkit-appearance: none; width: 22px; height: 22px; flex-shrink: 0; margin: 0;
  border: 1.5px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); border-radius: 7px;
  position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.gm-check:checked { background: var(--success); border-color: var(--success); box-shadow: 0 0 12px rgba(107,227,164,0.40); }
.gm-check:checked::after {
  content: ''; position: absolute; left: 6px; top: 2px; width: 6px; height: 11px;
  border: solid #0A0A0B; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg);
}
.gm-text { flex: 1; font-size: 14px; color: var(--text-primary); outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
.gm-text[contenteditable="true"] { outline: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); }
.goal-delete { border: 0; background: transparent; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 0 4px; opacity: 0.5; transition: opacity 0.2s, color 0.2s; }
.gm-row:hover .goal-delete { opacity: 1; }
.goal-delete:hover { color: var(--danger); }

.gm-input-wrap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
.gm-input {
  flex: 1; min-width: 0; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
  background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }
.gm-add {
  padding: 11px 20px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35), 0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:active { transform: translateY(0); }

/* Tab switcher: Goals / Events */
.planner-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.planner-tab {
  flex: 1; padding: 10px 14px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04); color: var(--text-tertiary); font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.planner-tab:hover { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
.planner-tab.active { background: rgba(255,255,255,0.14); color: var(--text-primary); border-color: rgba(255,255,255,0.26); }

/* Cross-view "next event" banner shown inside the Goals tab */
.next-event-pill {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%;
  padding: 10px 13px; margin-bottom: 16px; border-radius: 11px;
  border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05);
  color: var(--text-secondary); font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.next-event-pill:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }
.next-event-pill b { color: var(--text-primary); font-weight: 700; }
.next-event-pill .arrow { opacity: 0.6; flex-shrink: 0; }

/* Events list (merged from the former standalone Events page) */
.event-list { list-style: none; margin: 0; padding: 0; }
.event-row {
  display: flex; align-items: center; gap: 14px; padding: 14px;
  margin-bottom: 8px; background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 12px;
  transition: background 0.2s, opacity 0.3s;
}
.event-row:hover { background: rgba(255,255,255,0.06); }
.event-row.past { opacity: 0.4; }
.event-count {
  flex-shrink: 0; min-width: 74px; text-align: center;
  padding: 9px 8px; border-radius: 10px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
}
.event-count .n {
  display: block; font-size: 21px; font-weight: 700; line-height: 1;
  color: var(--text-primary); font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
}
.event-count .u {
  display: block; font-size: 8.5px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-tertiary); margin-top: 4px;
}
.event-row.soon .event-count { background: rgba(242,192,99,0.12); border-color: rgba(242,192,99,0.35); }
.event-row.soon .event-count .n { color: #F2C063; }
.event-row.today-row .event-count { background: rgba(107,227,164,0.14); border-color: rgba(107,227,164,0.4); }
.event-row.today-row .event-count .n { color: var(--success); font-size: 14px; line-height: 1.5; }
.event-main { flex: 1; min-width: 0; }
.event-name { font-size: 15px; font-weight: 600; color: var(--text-primary); outline: none; border-radius: 4px; padding: 1px 4px; margin: -1px -4px; }
.event-name[contenteditable="true"] { outline: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); }
.event-date { font-size: 11.5px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 3px; }
.event-del {
  border: 0; background: transparent; color: var(--text-tertiary);
  font-size: 18px; cursor: pointer; padding: 0 4px;
  opacity: 0.5; transition: opacity 0.2s, color 0.2s; flex-shrink: 0;
}
.event-row:hover .event-del { opacity: 1; }
.event-del:hover { color: var(--danger); }
input.gm-input[type="date"] { flex: 0 1 175px; color-scheme: dark; }

/* Mini strip: quick jump across the surrounding months */
.month-strip { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 4px; }
.month-strip::-webkit-scrollbar { display: none; }
.month-chip {
  flex-shrink: 0; padding: 8px 12px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03); color: var(--text-tertiary); font-family: inherit; font-size: 11.5px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.month-chip:hover { background: rgba(255,255,255,0.07); color: var(--text-secondary); }
.month-chip.active { background: rgba(255,255,255,0.14); color: var(--text-primary); border-color: rgba(255,255,255,0.26); }
.month-chip .n { display: block; font-family: var(--font-mono); font-size: 9.5px; color: var(--text-tertiary); margin-top: 2px; }
.month-chip.active .n { color: var(--text-secondary); }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
  .gm-progress-num { font-size: 36px; }
  .month-nav-label { font-size: 16px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Planner</h1>

  <div class="planner-tabs" id="plannerTabs">
    <button type="button" class="planner-tab active" data-view="goals">Goals</button>
    <button type="button" class="planner-tab" data-view="events">Events</button>
  </div>

  <div id="goalsView">
    <div class="gm-card">
      <div class="month-strip" id="monthStrip"></div>
    </div>

    <div class="gm-card">
      <div class="month-nav">
        <button class="month-nav-btn" id="prevMonthBtn" type="button" aria-label="Previous month">‹</button>
        <div class="month-nav-label" id="monthLabel">—</div>
        <button class="month-nav-btn" id="nextMonthBtn" type="button" aria-label="Next month">›</button>
        <button class="month-today-btn" id="todayBtn" type="button" style="display:none">Today</button>
      </div>

      <button type="button" class="next-event-pill" id="nextEventPill" style="display:none"></button>

      <div class="gm-header">
        <div class="gm-header-left">
          <div class="gm-eyebrow">Goals this month</div>
          <div class="gm-progress-row">
            <span class="gm-progress-num" id="doneNum">0</span>
            <span class="gm-progress-total" id="totalNum">/ 0</span>
            <span class="gm-progress-label">done</span>
          </div>
        </div>
        <span class="gm-streak" id="daysLeftPill" style="display:none"></span>
      </div>
      <div class="gm-bar" id="gmBar"></div>

      <ul class="goal-list" id="goalList"></ul>
      <div class="empty-state" id="emptyState">No goals for this month yet — add one below.</div>

      <div class="gm-input-wrap">
        <input class="gm-input" id="goalInput" type="text" placeholder="Add a goal for this month…" autocomplete="off">
        <button class="gm-add" id="goalAddBtn" type="button">+ Add</button>
      </div>
    </div>
  </div>

  <div id="eventsView" style="display:none">
    <div class="gm-card">
      <ul class="event-list" id="eventList"></ul>
      <div class="empty-state" id="eventsEmpty">Nothing coming up — add a birthday, deadline, or trip below.</div>

      <div class="gm-input-wrap">
        <input class="gm-input" id="eventName" type="text" placeholder="Event (e.g. Mom's birthday)" autocomplete="off">
        <input class="gm-input" id="eventDate" type="date">
        <button class="gm-add" id="eventAddBtn" type="button">+ Add</button>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const STORE_PREFIX = 'planner:';

  function loadJSON(k, f) {
    try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? f : v; }
    catch (e) { return f; }
  }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
  function newId() { return 'g' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function escHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

  // ---------- Tabs: Goals / Events ----------
  function setView(view) {
    $('goalsView').style.display = view === 'goals' ? '' : 'none';
    $('eventsView').style.display = view === 'events' ? '' : 'none';
    document.querySelectorAll('.planner-tab').forEach((b) => b.classList.toggle('active', b.dataset.view === view));
  }
  document.querySelectorAll('.planner-tab').forEach((b) => b.addEventListener('click', () => setView(b.dataset.view)));
  $('nextEventPill').addEventListener('click', () => setView('events'));

  function firstOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
  function monthKey(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }
  function monthLabel(d) { return d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' }); }
  function shortMonthLabel(d) { return d.toLocaleDateString(undefined, { month: 'short' }); }
  function daysInMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate(); }
  function sameMonth(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth(); }

  let viewDate = firstOfMonth(new Date());

  function loadGoals(key) { return loadJSON(STORE_PREFIX + key, []); }
  function saveGoals(key, arr) { saveJSON(STORE_PREFIX + key, arr); }

  function renderStrip() {
    const strip = $('monthStrip');
    strip.innerHTML = '';
    const today = firstOfMonth(new Date());
    for (let i = -3; i <= 3; i++) {
      const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
      const key = monthKey(d);
      const goals = loadGoals(key);
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'month-chip' + (sameMonth(d, viewDate) ? ' active' : '');
      chip.innerHTML = shortMonthLabel(d) + (goals.length ? '<span class="n">' + goals.filter(g => g.done).length + '/' + goals.length + '</span>' : '');
      chip.addEventListener('click', () => { viewDate = d; render(); });
      strip.appendChild(chip);
    }
  }

  // ---------- Events (merged from the former standalone Events page) ----------
  const EVENTS_KEY = 'events:items';
  function loadEvents() { return loadJSON(EVENTS_KEY, []); }
  function saveEvents(items) { saveJSON(EVENTS_KEY, items); }

  function daysUntil(dateStr) {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const parts = String(dateStr).split('-').map(Number);
    const target = new Date(parts[0], (parts[1] || 1) - 1, parts[2] || 1);
    return Math.round((target - today) / 86400000);
  }

  function nextUpcomingEvent() {
    let best = null;
    loadEvents().forEach((it) => {
      if (!it || !it.date) return;
      const d = daysUntil(it.date);
      if (d < 0) return;
      if (!best || d < best.days) best = { name: it.name, days: d };
    });
    return best;
  }

  function renderNextEventPill() {
    const pill = $('nextEventPill');
    const next = nextUpcomingEvent();
    if (!next) { pill.style.display = 'none'; return; }
    pill.style.display = 'flex';
    const when = next.days === 0 ? 'today' : next.days === 1 ? 'tomorrow' : 'in ' + next.days + ' days';
    pill.innerHTML = '<span>Next up: <b>' + escHtml(next.name) + '</b> — ' + when + '</span><span class="arrow">Events →</span>';
  }

  function renderEvents() {
    const items = loadEvents().slice().sort((a, b) => String(a.date).localeCompare(String(b.date)));
    const list = $('eventList');
    list.innerHTML = '';
    $('eventsEmpty').style.display = items.length ? 'none' : '';

    items.forEach((it) => {
      const days = daysUntil(it.date);
      const li = document.createElement('li');
      li.className = 'event-row' + (days < 0 ? ' past' : days === 0 ? ' today-row' : days <= 7 ? ' soon' : '');

      const count = document.createElement('div');
      count.className = 'event-count';
      if (days === 0) count.innerHTML = '<span class="n">Today</span>';
      else if (days < 0) count.innerHTML = '<span class="n">' + Math.abs(days) + '</span><span class="u">days ago</span>';
      else count.innerHTML = '<span class="n">' + days + '</span><span class="u">' + (days === 1 ? 'day' : 'days') + '</span>';

      const main = document.createElement('div');
      main.className = 'event-main';
      const name = document.createElement('div');
      name.className = 'event-name';
      name.textContent = it.name;
      name.contentEditable = 'true';
      name.addEventListener('blur', () => {
        const all = loadEvents();
        const e2 = all.find((x) => x.id === it.id);
        if (e2) { e2.name = name.textContent.trim(); saveEvents(all); renderNextEventPill(); }
      });
      name.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); name.blur(); } });
      const date = document.createElement('div');
      date.className = 'event-date';
      const parts = String(it.date).split('-').map(Number);
      date.textContent = new Date(parts[0], (parts[1] || 1) - 1, parts[2] || 1)
        .toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
      main.append(name, date);

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'event-del';
      del.textContent = '×';
      del.addEventListener('click', () => {
        saveEvents(loadEvents().filter((x) => x.id !== it.id));
        renderEvents();
        renderNextEventPill();
      });

      li.append(count, main, del);
      list.appendChild(li);
    });
  }

  function addEvent() {
    const name = $('eventName').value.trim();
    const date = $('eventDate').value;
    if (!name || !date) return;
    const items = loadEvents();
    items.push({ id: 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), name, date, addedAt: Date.now() });
    saveEvents(items);
    $('eventName').value = ''; $('eventDate').value = '';
    renderEvents();
    renderNextEventPill();
  }
  $('eventAddBtn').addEventListener('click', addEvent);
  $('eventName').addEventListener('keydown', (e) => { if (e.key === 'Enter') addEvent(); });

  function render() {
    renderStrip();
    renderNextEventPill();
    const key = monthKey(viewDate);
    const goals = loadGoals(key);
    const isCurrent = sameMonth(viewDate, new Date());

    $('monthLabel').textContent = monthLabel(viewDate);
    $('todayBtn').style.display = isCurrent ? 'none' : '';

    const daysLeftPill = $('daysLeftPill');
    if (isCurrent) {
      const left = daysInMonth(viewDate) - new Date().getDate();
      daysLeftPill.style.display = '';
      daysLeftPill.textContent = left <= 0 ? 'Last day' : left + (left === 1 ? ' day left' : ' days left');
    } else {
      daysLeftPill.style.display = 'none';
    }

    const done = goals.filter((g) => g.done).length;
    $('doneNum').textContent = done;
    $('totalNum').textContent = '/ ' + goals.length;

    const bar = $('gmBar');
    bar.innerHTML = '';
    goals.forEach((g) => {
      const seg = document.createElement('div');
      seg.className = 'gm-bar-seg' + (g.done ? ' gm-bar-seg-done' : '');
      bar.appendChild(seg);
    });

    const list = $('goalList');
    list.innerHTML = '';
    $('emptyState').style.display = goals.length ? 'none' : '';

    goals.forEach((g, i) => {
      const li = document.createElement('li');
      li.className = 'gm-row' + (g.done ? ' gm-row-done' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'gm-check';
      cb.checked = !!g.done;
      cb.addEventListener('change', () => {
        const arr = loadGoals(key);
        if (arr[i]) { arr[i].done = cb.checked; saveGoals(key, arr); render(); }
      });

      const txt = document.createElement('div');
      txt.className = 'gm-text';
      txt.textContent = g.text;
      txt.contentEditable = 'true';
      txt.addEventListener('blur', () => {
        const arr = loadGoals(key);
        if (arr[i]) { arr[i].text = txt.textContent.trim(); saveGoals(key, arr); }
      });
      txt.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); txt.blur(); } });

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'goal-delete';
      del.textContent = '×';
      del.addEventListener('click', () => {
        const arr = loadGoals(key);
        arr.splice(i, 1);
        saveGoals(key, arr);
        render();
      });

      li.append(cb, txt, del);
      list.appendChild(li);
    });
  }

  function addGoal() {
    const input = $('goalInput');
    const text = input.value.trim();
    if (!text) return;
    const key = monthKey(viewDate);
    const arr = loadGoals(key);
    arr.push({ id: newId(), text: text, done: false, addedAt: Date.now() });
    saveGoals(key, arr);
    input.value = '';
    render();
  }
  $('goalAddBtn').addEventListener('click', addGoal);
  $('goalInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addGoal(); });

  $('prevMonthBtn').addEventListener('click', () => { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1); render(); });
  $('nextMonthBtn').addEventListener('click', () => { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1); render(); });
  $('todayBtn').addEventListener('click', () => { viewDate = firstOfMonth(new Date()); render(); });

  render();
  renderEvents();

  document.addEventListener('DOMContentLoaded', function () {
    if (typeof initCloudSync !== 'function') return;
    initCloudSync({
      appKey: 'planner',
      syncedPrefixes: ['planner:'],
      onApplied: render,
    });
    // Events kept their own appKey from the former standalone page so
    // existing synced data carries over with no migration needed.
    initCloudSync({
      appKey: 'events',
      syncedPrefixes: ['events:'],
      onApplied: function () { renderEvents(); renderNextEventPill(); },
    });
  });
})();
</script>
</body>
</html>
