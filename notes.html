<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Notes · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

<style>
/* ===== Shared design tokens (same as the rest of the dashboard) ===== */
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --accent:  #D8D6D0;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(255,255,255,0.30), transparent 55%),
    radial-gradient(circle at 18% 90%, rgba(220,220,225,0.20), transparent 60%),
    radial-gradient(circle at 50% 55%, rgba(255,255,255,0.08), transparent 65%);
  filter: blur(85px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 1200px; margin: 0 auto; }
.dash-title {
  margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}

/* ===== Header row ===== */
.notes-topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.notes-icon-btn {
  width: 40px; height: 40px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.09); color: var(--text-secondary);
  cursor: pointer; transition: background 0.15s, color 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.notes-icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.notes-icon-btn:active { transform: scale(0.94); }
.notes-icon-btn svg { width: 20px; height: 20px; }
.notes-hamburger { display: none; }
.notes-new-btn { font-size: 22px; font-weight: 700; line-height: 1; }

/* ===== Shell layout ===== */
.notes-shell { display: flex; gap: 14px; align-items: stretch; height: min(74vh, 660px); min-height: 460px; position: relative; }

.notes-sidebar {
  width: 270px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px;
  background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px; padding: 14px;
  backdrop-filter: blur(46px) saturate(2.2); -webkit-backdrop-filter: blur(46px) saturate(2.2);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.38), inset 0 0 60px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.55); overflow: hidden;
}
.notes-search {
  width: 100%; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 11px; background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.2s, background 0.2s;
}
.notes-search::placeholder { color: var(--text-tertiary); }
.notes-search:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }

.notes-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.notes-empty { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 20px 8px; }
.notes-item {
  display: flex; align-items: center; gap: 4px; padding: 9px 8px 9px 10px;
  border-radius: 11px; cursor: pointer; background: rgba(255,255,255,0.02);
  border: 1px solid transparent; transition: background 0.15s, border-color 0.15s;
}
.notes-item:hover { background: rgba(255,255,255,0.06); }
.notes-item.active { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.14); }
.notes-item-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.notes-item-title { font-size: 13.5px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notes-item.active .notes-item-title { color: #FFFFFF; }
.notes-item-time { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); }
.notes-pin, .notes-item-del {
  border: 0; background: transparent; cursor: pointer; flex-shrink: 0;
  padding: 3px; opacity: 0; transition: opacity 0.15s, color 0.15s;
}
.notes-pin { font-size: 13px; color: var(--text-tertiary); }
.notes-pin.on { opacity: 1; color: var(--warning); }
.notes-item:hover .notes-pin { opacity: 0.7; }
.notes-pin.on:hover, .notes-pin:hover { opacity: 1; }
.notes-item-del { font-size: 15px; color: var(--text-tertiary); }
.notes-item:hover .notes-item-del { opacity: 0.55; }
.notes-item-del:hover { opacity: 1; color: var(--danger); }

.notes-sidebar-backdrop {
  position: fixed; inset: 0; z-index: 190; background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.notes-sidebar-backdrop.show { opacity: 1; pointer-events: auto; }

/* ===== Editor pane ===== */
.notes-editor {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px; padding: 16px 16px 12px;
  backdrop-filter: blur(46px) saturate(2.2); -webkit-backdrop-filter: blur(46px) saturate(2.2);
  box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.38), inset 0 0 60px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.55); overflow: hidden;
}
.notes-editor-head { display: flex; align-items: center; gap: 10px; }
.notes-title-input {
  flex: 1; min-width: 0; background: transparent; border: 0; outline: 0;
  color: var(--text-primary); font-family: var(--font);
  font-size: 22px; font-weight: 700; letter-spacing: -0.02em; padding: 4px 2px;
}
.notes-title-input::placeholder { color: var(--text-tertiary); }
.notes-editor-actions { display: flex; gap: 6px; flex-shrink: 0; }
.notes-meta { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin: 4px 2px 10px; }
.notes-footer { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin: 8px 2px 0; flex-shrink: 0; }

/* ===== Quill dark theme overrides ===== */
.ql-toolbar.ql-snow {
  border: 1px solid rgba(255,255,255,0.08); border-radius: 12px 12px 0 0;
  background: rgba(255,255,255,0.02); padding: 9px 10px;
}
.ql-container.ql-snow {
  border: 1px solid rgba(255,255,255,0.08); border-top: none;
  border-radius: 0 0 12px 12px; font-family: var(--font); font-size: 15px;
  flex: 1; min-height: 0; display: flex; flex-direction: column;
}
.ql-editor {
  color: var(--text-primary) !important; flex: 1; overflow-y: auto;
  padding: 16px 18px 32px; line-height: 1.65;
}
.ql-editor.ql-blank::before { color: var(--text-tertiary) !important; font-style: normal; left: 18px; right: 18px; }
.ql-editor h1, .ql-editor h2, .ql-editor h3 { color: var(--text-primary); letter-spacing: -0.02em; }
.ql-editor a { color: #FAFAFA !important; text-decoration: underline; }
.ql-editor blockquote {
  border-left: 3px solid var(--accent) !important; color: var(--text-secondary) !important;
  padding-left: 14px !important; margin: 10px 0 !important;
}
.ql-editor pre.ql-syntax { background: rgba(0,0,0,0.35) !important; color: #E8E5DD !important; border-radius: 10px; padding: 12px 14px; }
.ql-editor code, .ql-editor pre { background-color: rgba(255,255,255,0.10) !important; color: var(--text-primary) !important; border-radius: 4px; }
/* Checklists: Quill renders these as <ul data-checked="true|false"><li>…</li></ul> */
.ql-editor ul[data-checked] > li::before { color: var(--text-tertiary) !important; }
.ql-editor ul[data-checked=true] > li::before { color: var(--success) !important; }
.ql-editor ul[data-checked=true] > li { color: var(--text-tertiary) !important; text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.35); }

.ql-snow .ql-stroke { stroke: var(--text-secondary) !important; }
.ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill: var(--text-secondary) !important; }
.ql-snow .ql-picker { color: var(--text-secondary) !important; }
.ql-snow .ql-picker-options {
  background: #141416 !important; border: 1px solid rgba(255,255,255,0.10) !important;
  border-radius: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.5);
}
.ql-snow .ql-picker-item, .ql-snow .ql-picker-label { color: var(--text-secondary) !important; }
.ql-snow .ql-picker-item:hover, .ql-snow .ql-picker-label:hover,
.ql-snow .ql-picker-label.ql-active, .ql-snow .ql-picker-item.ql-selected { color: var(--text-primary) !important; }
.ql-snow.ql-toolbar button:hover, .ql-snow .ql-toolbar button:hover,
.ql-snow.ql-toolbar button.ql-active, .ql-snow .ql-toolbar button.ql-active { color: var(--text-primary) !important; }
.ql-snow.ql-toolbar button:hover .ql-stroke, .ql-snow .ql-toolbar button:hover .ql-stroke,
.ql-snow.ql-toolbar button.ql-active .ql-stroke, .ql-snow .ql-toolbar button.ql-active .ql-stroke,
.ql-snow .ql-picker-label:hover .ql-stroke, .ql-snow .ql-picker-item:hover .ql-stroke { stroke: var(--text-primary) !important; }
.ql-snow.ql-toolbar button:hover .ql-fill, .ql-snow .ql-toolbar button:hover .ql-fill,
.ql-snow.ql-toolbar button.ql-active .ql-fill, .ql-snow .ql-toolbar button.ql-active .ql-fill { fill: var(--text-primary) !important; }
.ql-snow .ql-tooltip {
  background: #14141a !important; border: 1px solid rgba(255,255,255,0.10) !important; color: var(--text-primary) !important;
  box-shadow: 0 12px 30px rgba(0,0,0,0.5); border-radius: 10px;
}
.ql-snow .ql-tooltip input[type=text] {
  background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.12) !important;
  color: var(--text-primary) !important; border-radius: 6px;
}
.ql-snow .ql-tooltip a.ql-action, .ql-snow .ql-tooltip a.ql-remove { color: #FAFAFA !important; text-decoration: underline; }

/* ===== Responsive: sidebar becomes a slide-over drawer ===== */
@media (max-width: 820px) {
  .notes-hamburger { display: inline-flex; }
  .notes-shell { height: min(78vh, 720px); }
  .notes-sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
    width: 82%; max-width: 320px; border-radius: 0 18px 18px 0;
    padding-top: max(20px, env(safe-area-inset-top));
    transform: translateX(-105%); transition: transform 0.22s ease;
  }
  .notes-sidebar.open { transform: translateX(0); }
}
/* ===== Sirius (AI mentor) integration ===== */
.sirius-ideas-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  width: 100%; padding: 10px 12px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03); color: var(--text-secondary); font-family: inherit;
  font-size: 12.5px; font-weight: 600; cursor: pointer; transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.sirius-ideas-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

.sirius-modal-bg {
  position: fixed; inset: 0; z-index: 220; display: none;
  align-items: center; justify-content: center; padding: 20px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.sirius-modal-bg.show { display: flex; }
.sirius-modal {
  width: 100%; max-width: 480px; max-height: 82vh; overflow-y: auto;
  background: #0e0e10; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 22px; box-shadow: 0 24px 70px rgba(0,0,0,0.6);
}
.sirius-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.sirius-modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.sirius-modal-close { border: 0; background: transparent; color: var(--text-tertiary); font-size: 24px; line-height: 1; cursor: pointer; padding: 0 4px; }
.sirius-modal-close:hover { color: var(--text-primary); }

.sirius-key-form { display: flex; flex-direction: column; gap: 10px; }
.sirius-key-row { display: flex; gap: 8px; }
.sirius-key-row input {
  flex: 1; min-width: 0; padding: 11px 13px; border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.3); color: var(--text-primary); font-family: inherit; font-size: 13px; outline: none;
}
.sirius-key-row button {
  border: 0; border-radius: 11px; padding: 0 16px; cursor: pointer; color: #0A0A0B;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); font-weight: 700; font-size: 13px; font-family: inherit;
}
.sirius-key-hint { font-size: 11.5px; color: var(--text-tertiary); line-height: 1.5; }
.sirius-key-hint a { color: var(--text-secondary); }

.sirius-loading { display: flex; align-items: center; gap: 8px; color: var(--text-tertiary); font-size: 13px; padding: 8px 0; }
.sirius-dots { display: inline-flex; gap: 5px; }
.sirius-dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--text-primary); opacity: 0.4; animation: sirius-d 1.2s ease-in-out infinite; }
.sirius-dots i:nth-child(2) { animation-delay: 0.2s; } .sirius-dots i:nth-child(3) { animation-delay: 0.4s; }
@keyframes sirius-d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.sirius-idea-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 13px;
  margin-bottom: 6px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.18); border-radius: 11px;
}
.sirius-idea-text { font-size: 13.5px; color: var(--text-primary); line-height: 1.4; }
.sirius-idea-add {
  flex-shrink: 0; font-size: 11px; font-weight: 700; padding: 7px 11px; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.09); color: var(--text-secondary);
  cursor: pointer; transition: background 0.15s, color 0.15s;
}
.sirius-idea-add:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }

.sirius-summary-text { font-size: 13.5px; color: var(--text-primary); line-height: 1.65; }
.sirius-summary-text ul { margin: 6px 0 0; padding-left: 18px; }
.sirius-insert-btn {
  width: 100%; margin-top: 14px; padding: 11px; border: 0; border-radius: 11px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B;
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
}
.sirius-insert-btn:hover { filter: brightness(1.05); }
.sirius-insert-btn.done { background: rgba(107,227,164,0.16); color: var(--success); }
.sirius-err { color: var(--danger); font-size: 12.5px; line-height: 1.5; }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .notes-title-input { font-size: 19px; }
  .notes-editor { padding: 14px 12px 10px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="notes-topbar">
    <button class="notes-icon-btn notes-hamburger" id="notesMenuBtn" type="button" aria-label="Toggle notes list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <h1 class="dash-title" style="flex:1">Notes</h1>
    <button class="notes-icon-btn notes-new-btn" id="notesNewBtn" type="button" aria-label="New note">+</button>
  </div>

  <div class="notes-shell">
    <div class="notes-sidebar-backdrop" id="notesBackdrop"></div>
    <aside class="notes-sidebar" id="notesSidebar">
      <input class="notes-search" id="notesSearch" type="text" placeholder="Search notes…" autocomplete="off">
      <button class="sirius-ideas-btn" id="siriusIdeasBtn" type="button">💡 Ideas to write about</button>
      <ul class="notes-list" id="notesList"></ul>
    </aside>

    <section class="notes-editor">
      <div class="notes-editor-head">
        <input class="notes-title-input" id="notesTitleInput" type="text" placeholder="Untitled" autocomplete="off">
        <div class="notes-editor-actions">
          <button class="notes-icon-btn" id="notesPinBtn" type="button" aria-label="Pin note" title="Pin">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l1.2 5.4L18 9l-4.5 3 1.3 6-4.8-3.4L5.2 18l1.3-6L2 9l4.8-1.6L8 2z"/>
            </svg>
          </button>
          <button class="notes-icon-btn" id="notesDeleteBtn" type="button" aria-label="Delete note" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
          <button class="notes-icon-btn" id="siriusSummarizeBtn" type="button" aria-label="Summarize with Sirius" title="Summarize with Sirius">🧠</button>
        </div>
      </div>
      <div class="notes-meta" id="notesMeta">—</div>
      <div id="editor"></div>
      <div class="notes-footer" id="notesFooter">0 words</div>
    </section>
  </div>

</div>

<!-- ===== Sirius modal (shared by "Ideas" and "Summarize") ===== -->
<div class="sirius-modal-bg" id="siriusModalBg">
  <div class="sirius-modal" role="dialog" aria-label="Sirius">
    <div class="sirius-modal-head">
      <span class="sirius-modal-title" id="siriusModalTitle">Sirius</span>
      <button class="sirius-modal-close" id="siriusModalClose" type="button" aria-label="Close">×</button>
    </div>
    <div id="siriusModalBody"></div>
  </div>
</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const INDEX_KEY = 'notes:index';
  const DOC_PREFIX = 'notes:doc:';
  const ACTIVE_KEY = 'notesActiveId'; // deliberately NOT prefixed 'notes:' — local-only, not synced

  function loadJSON(k, f) {
    try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? f : v; }
    catch (e) { return f; }
  }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  function loadIndex() { return loadJSON(INDEX_KEY, []); }
  function saveIndex(list) { saveJSON(INDEX_KEY, list); }

  function newId() { return 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function welcomeDoc() {
    return { ops: [
      { insert: 'Welcome to Notes' }, { insert: '\n', attributes: { header: 1 } },
      { insert: 'This works like Notion. Try typing these at the start of a line:' }, { insert: '\n' },
      { insert: '# ', attributes: { code: true } }, { insert: ' heading  ·  ' },
      { insert: '- ', attributes: { code: true } }, { insert: ' bullet  ·  ' },
      { insert: '[] ', attributes: { code: true } }, { insert: ' checklist  ·  ' },
      { insert: '> ', attributes: { code: true } }, { insert: ' quote  ·  ' },
      { insert: '``` ', attributes: { code: true } }, { insert: ' code block' }, { insert: '\n' },
      { insert: 'Or just use the toolbar above.' }, { insert: '\n\n' },
      { insert: 'First task' }, { insert: '\n', attributes: { list: 'unchecked' } },
      { insert: 'Second task' }, { insert: '\n', attributes: { list: 'checked' } },
      { insert: '\n' },
      { insert: 'A quoted idea worth remembering.' }, { insert: '\n', attributes: { blockquote: true } },
    ] };
  }

  function docText(id) {
    const d = loadJSON(DOC_PREFIX + id, null);
    if (!d || !Array.isArray(d.ops)) return '';
    return d.ops.map((o) => (typeof o.insert === 'string' ? o.insert : '')).join('');
  }

  function relTime(ts) {
    if (!ts) return '';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 10) return 'just now';
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    if (s < 172800) return 'yesterday';
    if (s < 604800) return Math.floor(s / 86400) + 'd ago';
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  // ---------- Quill ----------
  const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Start writing… ("# " heading, "- " bullet, "[] " checklist, "> " quote, "``` " code)',
    modules: {
      toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ list: 'ordered' }, { list: 'bullet' }, { list: 'check' }],
        ['blockquote', 'code-block', 'link'],
        ['clean'],
      ],
    },
  });

  // Quill's built-in "list autofill" only handles "1. " / "- " / "[] " / "[x] ".
  // Add matching Notion-style shortcuts for headings, quotes and code blocks.
  (function addMarkdownShortcuts() {
    const Delta = Quill.import('delta');

    quill.keyboard.addBinding(
      { key: ' ', collapsed: true, format: { header: false }, prefix: /^#{1,3}$/ },
      function (range, context) {
        const length = context.prefix.length;
        const [line, offset] = this.quill.getLine(range.index);
        if (offset > length) return true;
        this.quill.insertText(range.index, ' ', Quill.sources.USER);
        this.quill.history.cutoff();
        const delta = new Delta()
          .retain(range.index - offset)
          .delete(length + 1)
          .retain(line.length() - 2 - offset)
          .retain(1, { header: length });
        this.quill.updateContents(delta, Quill.sources.USER);
        this.quill.history.cutoff();
        this.quill.setSelection(range.index - length, Quill.sources.SILENT);
      }
    );

    quill.keyboard.addBinding(
      { key: ' ', collapsed: true, format: { blockquote: false }, prefix: /^>$/ },
      function (range, context) {
        const length = context.prefix.length;
        const [line, offset] = this.quill.getLine(range.index);
        if (offset > length) return true;
        this.quill.insertText(range.index, ' ', Quill.sources.USER);
        this.quill.history.cutoff();
        const delta = new Delta()
          .retain(range.index - offset)
          .delete(length + 1)
          .retain(line.length() - 2 - offset)
          .retain(1, { blockquote: true });
        this.quill.updateContents(delta, Quill.sources.USER);
        this.quill.history.cutoff();
        this.quill.setSelection(range.index - length, Quill.sources.SILENT);
      }
    );

    // "``` " then continue typing starts a code block on the current line.
    quill.keyboard.addBinding(
      { key: ' ', collapsed: true, format: { 'code-block': false }, prefix: /^```$/ },
      function (range, context) {
        const length = context.prefix.length;
        const [line, offset] = this.quill.getLine(range.index);
        if (offset > length) return true;
        this.quill.history.cutoff();
        const delta = new Delta()
          .retain(range.index - offset)
          .delete(length)
          .retain(line.length() - 1 - offset)
          .retain(1, { 'code-block': true });
        this.quill.updateContents(delta, Quill.sources.USER);
        this.quill.history.cutoff();
        this.quill.setSelection(range.index - length, Quill.sources.SILENT);
      }
    );
  })();

  let activeId = null;

  function ensureAtLeastOneNote() {
    let idx = loadIndex();
    if (idx.length === 0) {
      const id = newId();
      idx = [{ id, title: 'Welcome to Notes', updatedAt: Date.now(), pinned: false }];
      saveIndex(idx);
      saveJSON(DOC_PREFIX + id, welcomeDoc());
    }
    return idx;
  }

  function sortedIndex() {
    return loadIndex().slice().sort((a, b) => {
      if (!!b.pinned - !!a.pinned !== 0) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
      return (b.updatedAt || 0) - (a.updatedAt || 0);
    });
  }

  function renderSidebar(filter) {
    const listEl = $('notesList');
    listEl.innerHTML = '';
    const q = (filter || '').trim().toLowerCase();
    let items = sortedIndex();
    if (q) {
      items = items.filter((n) => {
        if ((n.title || '').toLowerCase().indexOf(q) !== -1) return true;
        return docText(n.id).toLowerCase().indexOf(q) !== -1;
      });
    }
    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'notes-empty';
      li.textContent = q ? 'No notes match your search.' : 'No notes yet.';
      listEl.appendChild(li);
      return;
    }
    items.forEach((n) => {
      const li = document.createElement('li');
      li.className = 'notes-item' + (n.id === activeId ? ' active' : '');

      const main = document.createElement('div');
      main.className = 'notes-item-main';
      const title = document.createElement('div');
      title.className = 'notes-item-title';
      title.textContent = n.title || 'Untitled';
      const time = document.createElement('div');
      time.className = 'notes-item-time';
      time.textContent = relTime(n.updatedAt);
      main.append(title, time);

      const pin = document.createElement('button');
      pin.type = 'button';
      pin.className = 'notes-pin' + (n.pinned ? ' on' : '');
      pin.setAttribute('aria-label', 'Pin note');
      pin.textContent = '★';
      pin.addEventListener('click', (e) => { e.stopPropagation(); togglePin(n.id); });

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'notes-item-del';
      del.setAttribute('aria-label', 'Delete note');
      del.textContent = '×';
      del.addEventListener('click', (e) => { e.stopPropagation(); deleteNote(n.id); });

      li.addEventListener('click', () => { selectNote(n.id); closeDrawer(); });
      li.append(main, pin, del);
      listEl.appendChild(li);
    });
  }

  function updateWordCount() {
    const text = quill.getText().trim();
    const words = text ? text.split(/\s+/).length : 0;
    $('notesFooter').textContent = words + (words === 1 ? ' word' : ' words');
  }

  function selectNote(id) {
    const idx = loadIndex();
    const entry = idx.find((n) => n.id === id);
    if (!entry) return;
    activeId = id;
    localStorage.setItem(ACTIVE_KEY, id);
    $('notesTitleInput').value = entry.title || '';
    $('notesMeta').textContent = entry.updatedAt ? 'Edited ' + relTime(entry.updatedAt) : '';
    $('notesPinBtn').classList.toggle('on', !!entry.pinned);
    suppressAutosave = true;
    quill.setContents(loadJSON(DOC_PREFIX + id, { ops: [{ insert: '\n' }] }));
    suppressAutosave = false;
    updateWordCount();
    renderSidebar($('notesSearch').value);
  }

  function createNote() {
    const id = newId();
    const idx = loadIndex();
    idx.unshift({ id, title: 'Untitled', updatedAt: Date.now(), pinned: false });
    saveIndex(idx);
    saveJSON(DOC_PREFIX + id, { ops: [{ insert: '\n' }] });
    selectNote(id);
    closeDrawer();
    $('notesTitleInput').focus();
  }

  function deleteNote(id) {
    if (!confirm('Delete this note? This can\'t be undone.')) return;
    let idx = loadIndex();
    idx = idx.filter((n) => n.id !== id);
    saveIndex(idx);
    localStorage.removeItem(DOC_PREFIX + id);
    if (activeId === id) {
      const next = sortedIndex()[0];
      if (next) selectNote(next.id);
      else { ensureAtLeastOneNote(); selectNote(loadIndex()[0].id); }
    } else {
      renderSidebar($('notesSearch').value);
    }
  }

  function togglePin(id) {
    const idx = loadIndex();
    const entry = idx.find((n) => n.id === id);
    if (!entry) return;
    entry.pinned = !entry.pinned;
    saveIndex(idx);
    if (id === activeId) $('notesPinBtn').classList.toggle('on', !!entry.pinned);
    renderSidebar($('notesSearch').value);
  }

  // ---------- title editing ----------
  let titleTimer = null;
  $('notesTitleInput').addEventListener('input', function () {
    clearTimeout(titleTimer);
    const val = this.value;
    titleTimer = setTimeout(() => {
      const idx = loadIndex();
      const entry = idx.find((n) => n.id === activeId);
      if (!entry) return;
      entry.title = val.trim();
      entry.updatedAt = Date.now();
      saveIndex(idx);
      renderSidebar($('notesSearch').value);
      $('notesMeta').textContent = 'Edited ' + relTime(entry.updatedAt);
    }, 300);
  });

  // ---------- quill autosave ----------
  let suppressAutosave = false;
  let saveTimer = null;
  quill.on('text-change', function (delta, oldDelta, source) {
    updateWordCount();
    if (source !== 'user' || suppressAutosave || !activeId) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveJSON(DOC_PREFIX + activeId, quill.getContents());
      const idx = loadIndex();
      const entry = idx.find((n) => n.id === activeId);
      if (entry) {
        entry.updatedAt = Date.now();
        saveIndex(idx);
        $('notesMeta').textContent = 'Edited ' + relTime(entry.updatedAt);
      }
    }, 400);
  });

  // ---------- search ----------
  $('notesSearch').addEventListener('input', function () { renderSidebar(this.value); });

  // ---------- toolbar actions ----------
  $('notesNewBtn').addEventListener('click', createNote);
  $('notesPinBtn').addEventListener('click', () => { if (activeId) togglePin(activeId); });
  $('notesDeleteBtn').addEventListener('click', () => { if (activeId) deleteNote(activeId); });

  // ---------- mobile drawer ----------
  function openDrawer() {
    $('notesSidebar').classList.add('open');
    $('notesBackdrop').classList.add('show');
  }
  function closeDrawer() {
    $('notesSidebar').classList.remove('open');
    $('notesBackdrop').classList.remove('show');
  }
  $('notesMenuBtn').addEventListener('click', openDrawer);
  $('notesBackdrop').addEventListener('click', closeDrawer);

  // ---------- Sirius (AI mentor): ideas + summarize ----------
  const SIRIUS_KEY_LS = 'nova_lite_api_key'; // shared with the Sirius mentor tile
  function siriusKey() { try { return localStorage.getItem(SIRIUS_KEY_LS) || ''; } catch (e) { return ''; } }
  function siriusEsc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

  function openSiriusModal(title) {
    $('siriusModalTitle').textContent = title;
    $('siriusModalBg').classList.add('show');
  }
  function closeSiriusModal() { $('siriusModalBg').classList.remove('show'); }
  $('siriusModalClose').addEventListener('click', closeSiriusModal);
  $('siriusModalBg').addEventListener('click', (e) => { if (e.target === $('siriusModalBg')) closeSiriusModal(); });

  function renderKeyForm(onSaved) {
    $('siriusModalBody').innerHTML =
      '<div class="sirius-key-form">' +
      '<div class="sirius-key-row"><input id="siriusKeyInput" type="password" placeholder="paste your Anthropic API key (sk-ant-…)" autocomplete="off">' +
      '<button id="siriusKeySave" type="button">Save</button></div>' +
      '<div class="sirius-key-hint">Stored only in this browser, sent straight to Anthropic. Shared with the Sirius mentor tile — paste it once. ' +
      'Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.</div>' +
      '</div>';
    $('siriusKeySave').addEventListener('click', () => {
      const k = $('siriusKeyInput').value.trim();
      if (!k) return;
      try { localStorage.setItem(SIRIUS_KEY_LS, k); } catch (e) {}
      onSaved();
    });
  }

  function renderSiriusLoading() {
    $('siriusModalBody').innerHTML = '<div class="sirius-loading"><span class="sirius-dots"><i></i><i></i><i></i></span> Sirius is thinking…</div>';
  }
  function renderSiriusError(msg) {
    $('siriusModalBody').innerHTML = '<div class="sirius-err">' + siriusEsc(msg) + '</div>';
  }

  async function callSirius(systemPrompt, userText) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': siriusKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 1024,
        system: systemPrompt,
        messages: [{ role: 'user', content: userText }],
      }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error.message || 'Something went wrong.');
    return (json.content && json.content[0] && json.content[0].text) || '';
  }

  function bulletLines(text) {
    return String(text).split(/\r?\n/).map(l => l.trim())
      .filter(l => /^[-•*]\s+/.test(l))
      .map(l => l.replace(/^[-•*]\s+/, '').replace(/\*\*/g, '').trim())
      .filter(Boolean);
  }

  // ---- Ideas: what to write about ----
  function runSiriusIdeas() {
    openSiriusModal('💡 Ideas to write about');
    if (!siriusKey()) { renderKeyForm(runSiriusIdeas); return; }
    renderSiriusLoading();

    const existingTitles = sortedIndex().slice(0, 30).map(n => n.title || 'Untitled');
    const system = "You are Sirius, the user's personal mentor embedded in their notes app. " +
      "Suggest fresh, specific things they could write a note about — a mix of reflections, plans, and ideas worth capturing. " +
      "Avoid repeating topics too close to their existing note titles listed below. " +
      "Format every suggestion as a '- ' bullet point, one short sentence each, no preamble. Give 6-8 suggestions.\n\n" +
      "Existing note titles: " + (existingTitles.length ? existingTitles.join(', ') : '(no notes yet)');

    callSirius(system, 'Give me ideas for notes to write.').then(reply => {
      const ideas = bulletLines(reply);
      if (ideas.length === 0) { renderSiriusError('Sirius didn\'t return any ideas — try again.'); return; }
      $('siriusModalBody').innerHTML = ideas.map((idea, i) =>
        '<div class="sirius-idea-row"><div class="sirius-idea-text">' + siriusEsc(idea) + '</div>' +
        '<button class="sirius-idea-add" data-idea="' + i + '" type="button">+ New note</button></div>'
      ).join('');
      $('siriusModalBody').querySelectorAll('.sirius-idea-add').forEach(btn => {
        btn.addEventListener('click', () => {
          const idea = ideas[parseInt(btn.dataset.idea, 10)];
          createNote();
          $('notesTitleInput').value = idea;
          $('notesTitleInput').dispatchEvent(new Event('input'));
          closeSiriusModal();
        });
      });
    }).catch(e => renderSiriusError(e.message || String(e)));
  }
  $('siriusIdeasBtn').addEventListener('click', runSiriusIdeas);

  // ---- Summarize the current note ----
  function runSiriusSummarize() {
    openSiriusModal('🧠 Summarize this note');
    if (!activeId) { renderSiriusError('Open a note first.'); return; }
    const text = quill.getText().trim();
    if (!text) { renderSiriusError('This note is empty — write something first.'); return; }
    if (!siriusKey()) { renderKeyForm(runSiriusSummarize); return; }
    renderSiriusLoading();

    const system = "You are Sirius, the user's personal mentor embedded in their notes app. " +
      "Summarize the note below concisely — 2-4 short bullet points capturing the key ideas, formatted as '- ' bullet points. No preamble.";

    callSirius(system, text).then(reply => {
      const lines = bulletLines(reply);
      const html = lines.length
        ? '<ul>' + lines.map(l => '<li>' + siriusEsc(l) + '</li>').join('') + '</ul>'
        : siriusEsc(reply);
      $('siriusModalBody').innerHTML =
        '<div class="sirius-summary-text">' + html + '</div>' +
        '<button class="sirius-insert-btn" id="siriusInsertBtn" type="button">Insert at top of note</button>';
      $('siriusInsertBtn').addEventListener('click', () => {
        const summaryLines = (lines.length ? lines : [reply.trim()]).filter(Boolean);
        const Delta = Quill.import('delta');
        const insertDelta = new Delta();
        summaryLines.forEach(line => { insertDelta.insert(line).insert('\n', { blockquote: true }); });
        insertDelta.insert('\n');
        quill.updateContents(insertDelta, Quill.sources.USER);
        const btn = $('siriusInsertBtn');
        btn.textContent = '✓ Inserted'; btn.classList.add('done'); btn.disabled = true;
        setTimeout(closeSiriusModal, 900);
      });
    }).catch(e => renderSiriusError(e.message || String(e)));
  }
  $('siriusSummarizeBtn').addEventListener('click', runSiriusSummarize);

  // ---------- boot ----------
  ensureAtLeastOneNote();
  const startId = localStorage.getItem(ACTIVE_KEY);
  const idx = loadIndex();
  const startEntry = (startId && idx.find((n) => n.id === startId)) || sortedIndex()[0];
  selectNote(startEntry.id);

  // ---------- cloud sync ----------
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof initCloudSync !== 'function') return;
    initCloudSync({
      appKey: 'notes',
      syncedPrefixes: ['notes:'],
      onApplied: function () {
        ensureAtLeastOneNote();
        const idx2 = loadIndex();
        const stillExists = idx2.find((n) => n.id === activeId);
        if (stillExists) {
          selectNote(activeId);
        } else {
          const next = sortedIndex()[0];
          if (next) selectNote(next.id);
        }
      },
    });
  });
})();
</script>
</body>
